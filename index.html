<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tutor Virtual — Lenguaje UNMSM</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f5f0e8;
  --surface: #fffdf8;
  --border: #d4c9b0;
  --accent: #2d5016;
  --accent2: #7a9e3b;
  --text: #1a1a0f;
  --muted: #6b6550;
  --user-bg: #2d5016;
  --user-text: #f5f0e8;
  --bot-bg: #fffdf8;
  --error: #8b2020;
  --success: #2d5016;
  --badge: #e8f0d8;
  --warning: #b8860b;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  max-width: 800px;
  margin: 0 auto;
}

header {
  background: var(--accent);
  color: var(--bg);
  padding: 14px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.avatar {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: var(--accent2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'DM Serif Display', serif;
  font-size: 18px;
  color: white;
  flex-shrink: 0;
  overflow: hidden;
}

.avatar img { width: 100%; height: 100%; object-fit: cover; }

header h1 {
  font-family: 'DM Serif Display', serif;
  font-size: 17px;
  font-weight: 400;
}

header p { font-size: 11px; opacity: 0.7; margin-top: 2px; }

.level-info {
  margin-left: auto;
  text-align: right;
}

.level-badge {
  background: var(--accent2);
  color: #fff;
  font-size: 11px;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: 20px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  display: inline-block;
  margin-bottom: 4px;
}

.progress-bar { height: 5px; background: var(--border); }
.progress-fill {
  height: 100%;
  background: var(--accent2);
  width: 0%;
  transition: width 0.6s ease;
}

.levels-strip {
  display: flex;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 8px 16px;
  gap: 6px;
  overflow-x: auto;
}

.level-dot {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  flex-shrink: 0;
}

.level-dot .dot {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  transition: all 0.3s;
}

.level-dot.active .dot { background: var(--accent2); color: white; }
.level-dot.done .dot { background: var(--accent); color: white; }
.level-dot span { font-size: 9px; color: var(--muted); text-align: center; max-width: 50px; line-height: 1.2; }

.chat-area {
  flex: 1;
  overflow-y: auto;
  padding: 20px 16px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  min-height: 350px;
  max-height: 420px;
}

.msg-row {
  display: flex;
  gap: 10px;
  align-items: flex-start;
  animation: fadeUp 0.3s ease;
}

.msg-row.user { flex-direction: row-reverse; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.msg-avatar {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  background: var(--accent2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  color: white;
  flex-shrink: 0;
  overflow: hidden;
  font-family: 'DM Serif Display', serif;
}

.msg-avatar img { width: 100%; height: 100%; object-fit: cover; }

.bubble {
  max-width: 78%;
  padding: 12px 16px;
  border-radius: 16px;
  font-size: 14px;
  line-height: 1.6;
}

.bubble.bot {
  background: var(--bot-bg);
  border: 1px solid var(--border);
  border-top-left-radius: 4px;
}

.bubble.user {
  background: var(--user-bg);
  color: var(--user-text);
  border-top-right-radius: 4px;
}

.bubble .sender {
  font-size: 11px;
  font-weight: 600;
  margin-bottom: 4px;
  color: var(--accent);
  opacity: 0.8;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.options-grid { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }

.opt-btn {
  background: var(--badge);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 10px 14px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  color: var(--text);
  cursor: pointer;
  text-align: left;
  transition: all 0.2s;
  line-height: 1.4;
}

.opt-btn:hover:not(:disabled) { border-color: var(--accent2); background: #ddeab8; }
.opt-btn.correct { border-color: var(--success); background: #d4ebbf; color: var(--success); font-weight: 500; }
.opt-btn.wrong { border-color: var(--error); background: #f5dada; color: var(--error); }
.opt-btn:disabled { cursor: default; opacity: 0.8; }

.topic-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-top: 10px;
}

.topic-btn {
  background: var(--badge);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 10px 12px;
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  color: var(--text);
  cursor: pointer;
  text-align: left;
  transition: all 0.2s;
  line-height: 1.4;
}

.topic-btn:hover:not(:disabled) { border-color: var(--accent2); background: #ddeab8; }

.extras-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-top: 10px;
}

.extra-btn {
  background: var(--surface);
  border: 1.5px dashed var(--border);
  border-radius: 10px;
  padding: 10px 12px;
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  color: var(--muted);
  cursor: pointer;
  text-align: left;
  transition: all 0.2s;
  line-height: 1.4;
}

.extra-btn:hover { border-color: var(--accent2); color: var(--text); background: #ddeab8; }

.rubric-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px;
  margin-top: 10px;
}

.rubric-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
  gap: 8px;
}

.rubric-row:last-child { border-bottom: none; }
.rubric-criterio { flex: 1; font-weight: 500; }
.rubric-nivel { font-size: 11px; padding: 2px 8px; border-radius: 10px; white-space: nowrap; }
.nivel-experto { background: #d4ebbf; color: var(--success); }
.nivel-proceso { background: #fef3cd; color: var(--warning); }
.nivel-principiante { background: #f5dada; color: var(--error); }
.rubric-pts { font-weight: 600; color: var(--accent); min-width: 40px; text-align: right; }

.nota-final {
  text-align: center;
  padding: 12px;
  margin-top: 10px;
  background: var(--badge);
  border-radius: 10px;
}

.nota-numero {
  font-family: 'DM Serif Display', serif;
  font-size: 36px;
  color: var(--accent);
}

.nota-label { font-size: 12px; color: var(--muted); margin-top: 2px; }

.input-area {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  background: var(--surface);
}

.extras-bar {
  display: flex;
  gap: 6px;
  margin-bottom: 8px;
  flex-wrap: wrap;
}

.extra-pill {
  background: var(--badge);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 3px 10px;
  font-size: 11px;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.2s;
  font-family: 'DM Sans', sans-serif;
}

.extra-pill:hover { border-color: var(--accent2); color: var(--accent); }

.input-row { display: flex; gap: 8px; }

textarea {
  flex: 1;
  border: 1.5px solid var(--border);
  border-radius: 12px;
  padding: 10px 14px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  color: var(--text);
  background: var(--bg);
  resize: none;
  outline: none;
  min-height: 44px;
  max-height: 120px;
  transition: border-color 0.2s;
}

textarea:focus { border-color: var(--accent2); }
textarea:disabled { opacity: 0.5; }

button#send-btn {
  background: var(--accent);
  color: var(--bg);
  border: none;
  border-radius: 12px;
  padding: 10px 18px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s;
  align-self: flex-end;
}

button#send-btn:hover:not(:disabled) { background: var(--accent2); }
button#send-btn:disabled { opacity: 0.5; cursor: default; }

.typing {
  display: flex; gap: 4px; padding: 4px 0; align-items: center;
}
.typing span {
  width: 7px; height: 7px;
  background: var(--muted);
  border-radius: 50%;
  animation: bounce 1.2s infinite;
}
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce {
  0%,60%,100% { transform: translateY(0); }
  30% { transform: translateY(-6px); }
}

.level-complete {
  text-align: center;
  padding: 16px;
}

.level-complete .medal { font-size: 40px; margin-bottom: 8px; }
.level-complete h3 {
  font-family: 'DM Serif Display', serif;
  font-size: 18px;
  color: var(--accent);
  margin-bottom: 4px;
}
.level-complete p { font-size: 13px; color: var(--muted); margin-bottom: 12px; }

.continue-btn {
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 10px;
  padding: 10px 20px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s;
}

.continue-btn:hover { background: var(--accent2); }
</style>
</head>
<body>

<header>
  <div class="avatar" id="header-avatar">DR</div>
  <div>
    <p style="font-size:10px;opacity:0.6;text-transform:uppercase;letter-spacing:0.08em">Tutor Virtual · Lenguaje UNMSM</p>

    <button class="extra-pill" onclick="activateExtra('introduccion')">📝 Introducción</button>

    <button class="extra-pill" onclick="activateExtra('cohesion')">🧩 Cohesión</button>
    <button class="extra-pill" onclick="activateExtra('registro')">🎓 Registro académico</button>
  </div>
  <div class="input-row">
    <textarea id="user-input" placeholder="Escribe tu respuesta aquí..." rows="1" disabled></textarea>
    <button id="send-btn" onclick="sendMessage()" disabled>Enviar</button>
  </div>
</div>

<script>
// ============================================================
// CONFIGURACIÓN — Reemplaza con tu API key real
// ============================================================

// ============================================================
// GOOGLE SHEETS — Registro de datos de investigación
// ============================================================
const SHEETS_URL = "https://script.google.com/macros/s/AKfycby4L1Qw5MHSZwHx795iVgopZYO4yimEu5bfrmNEpDwlQ0VYswDjcF50clGYWrUqWDBoAA/exec";

async function saveToSheets(event, extra = {}) {
  try {
    await fetch(SHEETS_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        timestamp: new Date().toISOString(),
        student: state.studentName || "",
        group: state.groupNumber || "",
        groupSize: state.groupSize || "",
        topic: state.groupTopic || "",
        level: state.currentLevel || 0,
        event: event,
        extra: extra
      })
    });
  } catch(e) {
    console.log("Sheets no disponible:", e);
  }
}

// ============================================================
// LOCAL STORAGE — Guardar progreso del alumno entre sesiones
// ============================================================
const STORAGE_KEY = "tutor_lenguaje_progress";

function saveProgress() {
  try {
    const progress = {
      studentName: state.studentName,
      groupNumber: state.groupNumber,
      groupSize: state.groupSize,
      groupTopic: state.groupTopic,
      delimitacion: state.delimitacion,
      thesis: state.thesis,
      sources: state.sources,
      argument: state.argument,
      currentLevel: state.currentLevel,
      completedLevels: state.completedLevels || []
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
  } catch(e) {
    console.log("localStorage no disponible:", e);
  }
}

function loadProgress() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (!saved) return null;
    return JSON.parse(saved);
  } catch(e) {
    return null;
  }
}

function clearProgress() {
  try {
    localStorage.removeItem(STORAGE_KEY);
  } catch(e) {}
}

const API_KEY = "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";
const ELEVENLABS_API_KEY = "sk_b88a1dcd50c091fc6afb63c227c727f8cc29df266734fbf4";
const ELEVENLABS_VOICE_ID = "qjnjSEiHF0G6theFSflX";

// Cola de audio para evitar que se mezclen
let audioQueue = [];
let audioPlaying = false;

async function playNextAudio() {
  if (audioPlaying || audioQueue.length === 0) return;
  audioPlaying = true;
  const url = audioQueue.shift();
  const audio = new Audio(url);
  audio.onended = () => { audioPlaying = false; playNextAudio(); };
  audio.onerror = () => { audioPlaying = false; playNextAudio(); };
  audio.play();
}

async function speakText(text) {
  try {
    // No leer si es HTML con opciones de ejercicio
    if (text.includes('opt-btn') || text.includes('topic-btn') || text.includes('opts-')) return;
    // No leer textos muy cortos o muy largos
    const clean = text.replace(/<[^>]*>/g, "").replace(/[#*_`]/g, "").trim();
    if (!clean || clean.length < 10 || clean.length > 600) return;

    const res = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${ELEVENLABS_VOICE_ID}`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "xi-api-key": ELEVENLABS_API_KEY
      },
      body: JSON.stringify({
        text: clean,
        model_id: "eleven_multilingual_v2",
        voice_settings: { stability: 0.75, similarity_boost: 0.60, style: 0.15, use_speaker_boost: false }
      })
    });
    if (!res.ok) return;
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    audioQueue.push(url);
    playNextAudio();
  } catch(e) {
    console.log("Audio no disponible:", e);
  }

function setInput(enabled) {

}

function scrollDown() { chat.scrollTop = chat.scrollHeight; }

function addBubble(role, html, isHTML = true) {
  const row = document.createElement("div");
  row.className = `msg-row ${role}`;

  if (role === "bot") {
    const av = document.createElement("div");
    av.className = "msg-avatar";
    av.innerHTML = AVATAR_URL ? `<img src="${AVATAR_URL}">` : "DR";
    row.appendChild(av);
  }

  const bub = document.createElement("div");
  bub.className = `bubble ${role}`;

  if (role === "bot") {
    const sender = document.createElement("div");
    sender.className = "sender";
    sender.textContent = "Tutor";
    bub.appendChild(sender);
  }

  const body = document.createElement("div");
  if (isHTML) body.innerHTML = html;
  else body.textContent = html;
  bub.appendChild(body);
  row.appendChild(bub);
  chat.appendChild(row);
  scrollDown();
  if (role === "bot" && typeof speakText === "function") {
    const plainText = body.innerText || body.textContent || "";
    if (plainText.length > 5 && plainText.length < 800) speakText(plainText);
  }
  return body;
}

function addTyping() {
  const row = document.createElement("div");
  row.className = "msg-row bot";
  row.id = "typing";
  const av = document.createElement("div");
  av.className = "msg-avatar";
  av.innerHTML = AVATAR_URL ? `<img src="${AVATAR_URL}">` : "DR";

  bub.className = "bubble bot";
  bub.innerHTML = `<div class="sender">Tutor</div><div class="typing"><span></span><span></span><span></span></div>`;
  row.appendChild(bub);
  chat.appendChild(row);
  scrollDown();
}

function removeTyping() {
  const t = document.getElementById("typing");
  if (t) t.remove();
}

function updateProgress(level) {
  const pct = (level / 6) * 100;
  document.getElementById("progress").style.width = pct + "%";
  document.getElementById("level-label").textContent = LEVELS[level].name;
  for (let i = 0; i <= 6; i++) {
    const dot = document.getElementById(`dot-${i}`);
    dot.className = "level-dot" + (i < level ? " done" : i === level ? " active" : "");
  }
  if (level >= 2) document.getElementById("extras-bar").style.display = "flex";
}

    ...data
  });

  saveToSheets(event, data);
  // Guardar progreso en localStorage
  saveProgress();
}

async function callClaude(system, messages, json = false) {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": API_KEY,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true"
    },
    body: JSON.stringify({
      model: "claude-haiku-4-5-20251001",
      max_tokens: 1000,
      system,
      messages
    })
  });
  const data = await res.json();
  if (!data.content) throw new Error(JSON.stringify(data));
  const text = data.content[0].text.trim();
  if (json) return JSON.parse(text.replace(/```json|```/g, "").trim());
  return text;
}

  const hoy = new Date();

FECHA LÍMITE DEL SISTEMA: viernes 11 de julio de 2025.

PROHIBICIÓN ABSOLUTA — REDACCIÓN:
Bajo ninguna circunstancia redactas, completas ni reescribes texto para el alumno.
Esto incluye: delimitaciones, tesis, párrafos, oraciones, fuentes o cualquier parte del ensayo.

REGLA INNEGOCIABLE — CONTEXTO PERUANO:
El tema SIEMPRE debe referirse al Perú. Nunca apruebes un tema que no tenga al Perú como contexto central.

de sus experiencias en el Perú. Ejemplo válido: "Aplicación de estrategias colombianas para reducir
el embarazo adolescente en la región Loreto, 2024".

REGLA — SALTAR NIVELES PROHIBIDO:
El alumno debe completar los niveles en orden. No puedes aprobar un nivel si el anterior no está aprobado.
Si el alumno intenta saltar un nivel, recuérdale que debe completar el nivel actual primero.

CRITERIOS POR NIVEL:

NIVEL 1 — Delimitación provisional del tema:
La delimitación es PROVISIONAL — el alumno puede ajustarla en el Nivel 2 según las fuentes que encuentre.
Una delimitación válida debe tener los tres elementos: (1) población o sujeto específico,
(2) contexto geográfico — puede ser todo el Perú o una región específica según el tema,
(3) periodo temporal con años específicos.

IMPORTANTE SOBRE EL CONTEXTO GEOGRÁFICO:
No exijas siempre una región específica. Muchos temas tienen fuentes a nivel nacional y es válido
delimitar con "en el Perú" como contexto geográfico. Solo sugiere una región específica si el
alumno está tratando un tema donde tiene sentido regionalizarlo.
Ejemplos válidos:
- "Las causas de la deserción escolar en el Perú entre 2020 y 2025" — válido, contexto nacional
- "La violencia de género en adolescentes de Lima entre 2019 y 2023" — válido, contexto regional
- "La informalidad laboral en Perú en los últimos 5 años" — válido, contexto nacional

Si los tres elementos están presentes aunque sean provisionales, aprueba.
Al aprobar dile que la delimitación es provisional y podrá ajustarla en el Nivel 2 según las fuentes.
Si aprueba escribe exactamente: NIVEL_APROBADO

NIVEL 2 — Revisión de fuentes:
Al inicio de este nivel pide al alumno que te recuerde su delimitación provisional del Nivel 1.
El alumno debe presentar mínimo 3 fuentes académicas o periodísticas serias (no Wikipedia, no blogs).
Cada fuente debe tener: autor, año y título. Las citas APA solo requieren número de página cuando son citas textuales directas — no en paráfrasis.
Si las fuentes no coinciden exactamente con la delimitación provisional, guía al alumno para
ajustar el tema según lo disponible — siempre manteniendo el Perú como contexto central.
Ejemplo de ajuste válido: si buscaba consecuencias en Iquitos 2023-2025 pero solo encontró
estudios de causas en Perú 2018-2022, el tema puede ajustarse a eso.
Si aprueba escribe exactamente: NIVEL_APROBADO

NIVEL 3 — Planteamiento de tesis:
La tesis debe ser: una afirmación debatible (no un hecho), coherente con el tema ajustado en el Nivel 2, específica y argumentable con las fuentes disponibles.
FLEXIBILIDAD DE LA TESIS: La tesis puede mencionar 1, 2 o 3 causas/argumentos — todas son válidas. No exijas un formato específico ni un número determinado de causas. Lo importante es que sea debatible y específica.
Si aprueba escribe exactamente: NIVEL_APROBADO

MINI CLASE INTRODUCTORIA (al inicio de cada nivel, antes de los ejercicios):
Genera una clase breve de máximo 5-6 oraciones que explique el concepto central del nivel.
La clase debe:
- Usar lenguaje claro y accesible para universitarios de primer año
- Incluir un ejemplo concreto usando un tema de problemática peruana diferente al del alumno
- Conectar el concepto con lo trabajado en niveles anteriores
- Anticipar el error más frecuente que cometen los alumnos en ese nivel
- Terminar con una pregunta motivadora que prepare al alumno para los ejercicios

Contenido por nivel:
  Nivel 1: qué es delimitar un tema, los tres elementos obligatorios y cómo las fuentes pueden ajustar la delimitación
  Nivel 2: qué es una fuente académica, cómo distinguirla, cómo leer una referencia bibliográfica
  Nivel 3: qué es una tesis, diferencia entre tesis/tema/pregunta, cómo construir una afirmación debatible
  Nivel 4: qué es el esquema de desarrollo, qué son evidencias y análisis, cómo redactar en frases no párrafos
  Nivel 5: qué es un párrafo académico, oraciones bimembres, cómo combinar evidencia y análisis, cómo citar en APA 7ma
  Nivel 6: cómo funciona la rúbrica, qué significa cada nivel gamificado, qué se espera de un texto Experto

NIVEL 4 — Esquema de argumentos:
El alumno presenta su esquema en texto con esta estructura obligatoria:
  1. ARGUMENTO: una frase que defienda la tesis del grupo
  2. EVIDENCIAS: hasta 3 frases extraídas de las fuentes del Nivel 2, cada una con su cita APA 7ma
  3. ANÁLISIS: hasta 3 frases que expliquen cómo las evidencias sustentan el argumento y la tesis

CRITERIOS DE EVALUACIÓN DEL ESQUEMA:
- Todo debe estar redactado en frases — NO en párrafos
- Las evidencias deben tener citas APA 7ma
- El argumento debe ser coherente con la tesis del Nivel 3
- El análisis debe mostrar relaciones lógicas — causa-efecto, generalización, definición

ERRORES FRECUENTES A DETECTAR:
- Evidencias sin cita
- Análisis ausente o confundido con evidencia
- Argumento que no defiende la tesis
FLEXIBILIDAD DEL ESQUEMA: El esquema acepta frases cortas, incompletas o telegráficas — NO exijas oraciones completas con sujeto y verbo. El esquema es un borrador de ideas, no un párrafo redactado. Solo exige que la idea sea comprensible y la cita esté presente en las evidencias.

La estructura es una guía — puede haber flexibilidad en el orden pero los tres elementos deben estar presentes.
Si aprueba escribe exactamente: NIVEL_APROBADO

NIVEL 5 — Párrafo de desarrollo:
PARÁMETROS OBLIGATORIOS:
  1. Encabezado con el argumento — primera oración que enuncia la postura
  2. Todas las oraciones deben ser bimembres — con sujeto explícito o tácito
  3. Citas APA 7ma para todo lo extraído de fuentes — si hay citas mal redactadas señala cuántas y cómo corregirlas
  4. Extensión entre 200 y 250 palabras — ni más ni menos
  5. El análisis es el elemento más valorado — evalúa la habilidad argumentativa del alumno

DOS MODALIDADES VÁLIDAS:
  Modalidad 1 — Intercalada: Evidencia 1 + análisis 1 → Evidencia 2 + análisis 2
  Modalidad 2 — Bloques: Evidencia 1 + Evidencia 2 → Análisis conjunto de ambas

CRITERIOS DE EVALUACIÓN DEL PÁRRAFO:
- Si no hay argumento como encabezado → señala y pide reformular
- Si hay oraciones unimembres → señala cuáles y pide corregirlas
- Si hay citas mal redactadas en APA 7ma → indica cuántas y guía la corrección — no rechaza todo el párrafo
- Si el párrafo tiene menos de 200 o más de 250 palabras → indica la extensión actual y pide ajustar
- Si el análisis es superficial o ausente → señala que es el elemento más importante y guía al alumno para profundizarlo
- Si la modalidad es mixta o poco clara → acepta si los elementos están presentes

No rechaces el párrafo por un solo error — señala todos los errores encontrados y da oportunidad de corregir.
Si todos los parámetros se cumplen escribe exactamente: NIVEL_APROBADO

NIVEL 6 — Revisión final con rúbrica:
El alumno pega el ensayo completo del grupo.
Evalúa SOLO el párrafo de desarrollo del alumno. Tema y tesis se evalúan grupalmente.

RÚBRICA CON DESCRIPTORES ALINEADOS A LOS NIVELES 4 Y 5:

Criterio 1 — Tema (grupal, máx. 3 pts):
  Principiante (0-1): tema amplio, vago, sin los tres elementos de delimitación
  En proceso (1.5-2): delimitado pero incompleto o poco actualizado
  Experto (2.5-3): correctamente delimitado con población, lugar y periodo. Relevante y actual.

Criterio 2 — Tesis (grupal, máx. 3 pts):
  Principiante (0-1): ausente, confusa o no debatible
  En proceso (1.5-2): coherente pero débil o poco específica
  Experto (2.5-3): clara, debatible, específica y coherente con el tema

Criterio 3 — Evidencias (individual, máx. 4 pts):
  Principiante (0-1): sin fuentes académicas o sin citas APA
  En proceso (1.5-2.5): fuentes presentes pero con citas APA incorrectas o incompletas
  Experto (3-4): fuentes académicas correctamente citadas en APA 7ma. Evidencias pertinentes al argumento.

Criterio 4 — Argumentación (individual, máx. 4 pts):
  Principiante (0-1): sin argumento como encabezado o sin análisis real
  En proceso (1.5-2.5): argumento presente pero análisis superficial o confundido con evidencia
  Experto (3-4): argumento claro como encabezado. Análisis profundo que establece relaciones lógicas
  y demuestra habilidad argumentativa real. Modalidad intercalada o por bloques bien ejecutada.

Criterio 5 — Coherencia y cohesión (individual, máx. 3 pts):
  Principiante (0-1): sin conectores, texto desarticulado o extensión fuera del rango 200-250 palabras
  En proceso (1.5-2): algunos conectores, coherencia parcial, extensión cercana al rango
  Experto (2.5-3): conectores apropiados, texto fluido, extensión dentro del rango 200-250 palabras

Criterio 6 — Gramática (individual, máx. 2 pts):
  Principiante (0-0.5): oraciones unimembres frecuentes, léxico inapropiado para registro académico
  En proceso (1): mayoría de oraciones bimembres pero con algunos errores, léxico aceptable
  Experto (1.5-2): todas las oraciones son bimembres, léxico académico preciso y variado

Criterio 7 — Ortografía (individual, máx. 1 pt):
  Principiante (0): 5 o más errores ortográficos
  En proceso (0.5): 2 a 4 errores moderados
  Experto (1): sin errores o máximo 1 error menor

Responde ÚNICAMENTE en JSON con este formato exacto:
{"criterios":[{"nombre":"Tema","nivel":"Experto","pts":3,"max":3,"feedback":"..."},{"nombre":"Tesis","nivel":"En proceso","pts":1.5,"max":3,"feedback":"..."},{"nombre":"Evidencias","nivel":"Experto","pts":4,"max":4,"feedback":"..."},{"nombre":"Argumentación","nivel":"Principiante","pts":0,"max":4,"feedback":"..."},{"nombre":"Coherencia y cohesión","nivel":"En proceso","pts":1.5,"max":3,"feedback":"..."},{"nombre":"Gramática","nivel":"Experto","pts":2,"max":2,"feedback":"..."},{"nombre":"Ortografía","nivel":"Experto","pts":1,"max":1,"feedback":"..."}],"nota_total":13,"mensaje_final":"texto motivador"}`;
}

async function botRespond(userMsg) {
  setInput(false);
  addTyping();
  state.history.push({ role: "user", content: userMsg });
  logData("user_message", { text: userMsg, phase: state.phase });

  try {
    const isLevel6 = state.currentLevel === 6 && state.phase === "application";
    const reply = await callClaude(getSystemPrompt(), state.history, isLevel6);
    removeTyping();
    state.history.push({ role: "assistant", content: isLevel6 ? JSON.stringify(reply) : reply });

    if (isLevel6 && typeof reply === "object") {
      renderRubric(reply);
      logData("rubric_result", { nota: reply.nota_total, criterios: reply.criterios });
    } else if (typeof reply === "string" && reply.includes("NIVEL_APROBADO")) {
      const clean = reply.replace("NIVEL_APROBADO", "").trim();
      if (clean) addBubble("bot", clean, false);
      logData("level_approved", { level: state.currentLevel });
      setTimeout(() => showLevelComplete(), 800);
    } else {
      addBubble("bot", reply, false);
      setInput(true);
    }
  } catch(e) {
    removeTyping();
    addBubble("bot", "Hubo un error de conexión. Por favor intenta de nuevo.", false);
    setInput(true);
  }
}

async function generateExercise(levelKey) {
  state.phase = "exercise";
  state.exercisesDone++;
  setInput(false);
  addTyping();

  const otherTopics = TOPICS.filter(t => t !== state.topic);
  const exTopic = otherTopics[Math.floor(Math.random() * otherTopics.length)];

  const prompts = {
    nivel1: `Genera un ejercicio de opción múltiple sobre delimitación de tema académico usando el tema "${exTopic}". Una opción correcta (tiene población + contexto geográfico peruano + periodo temporal). Tres incorrectas con errores típicos.`,
    nivel2: `Genera un ejercicio de opción múltiple sobre revisión de fuentes académicas usando el tema "${exTopic}". Una opción correcta (fuente académica con autor, año y título). Tres incorrectas (Wikipedia, blog, sin datos completos).`,
    nivel3: `Genera un ejercicio de opción múltiple sobre planteamiento de tesis usando el tema "${exTopic}". Una opción correcta (afirmación debatible y específica). Tres incorrectas (hecho, pregunta, o demasiado vaga).`
  };

  const prompt = prompts[levelKey] || prompts.nivel1;

  try {
    const ex = await callClaude(
      `Responde ÚNICAMENTE en JSON válido sin markdown: {"pregunta":"...","tema_ejercicio":"${exTopic}","opciones":[{"letra":"A","texto":"..."},{"letra":"B","texto":"..."},{"letra":"C","texto":"..."},{"letra":"D","texto":"..."}],"correcta":"A","explicacion_correcta":"...","explicacion_error":"..."}`,
      [{ role: "user", content: prompt }],
      true
    );
    removeTyping();
    renderExercise(ex, levelKey);
  } catch(e) {
    removeTyping();
    addBubble("bot", "No pude generar el ejercicio. Vamos directamente a la práctica con tu tema.", false);
    state.phase = "application";
    startApplication(levelKey);
    setInput(true);
  }
}

function renderExercise(ex, levelKey) {
  const num = state.exercisesDone;
  let html = `<div style="margin-bottom:8px;font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:0.05em">Ejercicio ${num} de 2 · Tema: ${ex.tema_ejercicio}</div>`;
  html += `<div style="margin-bottom:10px;line-height:1.5">${ex.pregunta}</div>`;
  html += `<div class="options-grid" id="opts-${num}">`;
  ex.opciones.forEach(op => {
    const safe = ex.explicacion_correcta.replace(/'/g, "\\'").replace(/"/g, '\\"');
    const safeErr = ex.explicacion_error.replace(/'/g, "\\'").replace(/"/g, '\\"');
    html += `<button class="opt-btn" data-letra="${op.letra}" onclick="checkAnswer(this,'${op.letra}','${ex.correcta}',${num},'${safe}','${safeErr}','${levelKey}')">
      <strong>${op.letra}.</strong> ${op.texto}
    </button>`;
  });
  html += `</div><div id="fb-${num}" style="margin-top:8px;font-size:13px;line-height:1.5"></div>`;
  addBubble("bot", html);
}

async function checkAnswer(btn, chosen, correct, num, expOk, expErr, levelKey) {
  const grid = document.getElementById(`opts-${num}`);
  const fb = document.getElementById(`fb-${num}`);
  grid.querySelectorAll(".opt-btn").forEach(b => {
    b.disabled = true;
    if (b.dataset.letra === correct) b.classList.add("correct");
  });

  logData("exercise_answer", { chosen, correct, correct_answer: chosen === correct });

  if (chosen === correct) {
    btn.classList.add("correct");
    fb.innerHTML = `<span style="color:var(--success);font-weight:600">✓ Correcto.</span> ${expOk}`;
  } else {
    btn.classList.add("wrong");
    fb.innerHTML = `<span style="color:var(--error);font-weight:600">✗ No es la correcta.</span> ${expErr} La respuesta correcta era <strong>${correct}</strong>.`;
  }

  setTimeout(async () => {
    if (state.exercisesDone < 2) {
      addBubble("bot", chosen === correct
        ? "¡Muy bien! Hagamos otro ejercicio."
        : "No te preocupes, practiquemos un poco más.", false);
      await generateExercise(levelKey);
    } else {
      startApplication(levelKey);
    }
  }, 1400);
}

    removeTyping();
    addBubble("bot", reply, false);
    logData("mini_class_shown", { level: levelIndex, levelKey });

    // Después de la clase, ejercicios o aplicación
    setTimeout(() => {
      if (levelIndex <= 3) {
        addBubble("bot", "Ahora practiquemos con dos ejercicios antes de trabajar con tu tema. ¡Adelante!", false);
        setTimeout(() => generateExercise(levelKey), 600);
      } else {
        startApplication(levelKey);
      }
    }, 1000);

  } catch(e) {
    removeTyping();
    // Si falla la clase, continúa directamente
    if (levelIndex <= 3) {
      generateExercise(levelKey);
    } else {
      startApplication(levelKey);
    }
  }
}

// ============================================================
// EXTRAS OPCIONALES
// ============================================================
async function activateExtra(tipo) {
  const names = {
    introduccion: "Introducción",
    conclusion: "Conclusión",
    ortografia: "Revisión ortográfica",
    coherencia: "Análisis de coherencia interna",
    cohesion: "Verificación de cohesión entre párrafos",
    registro: "Evaluación de registro académico"
  };

  addBubble("user", `Quiero usar el extra: ${names[tipo]}`, false);
  setInput(false);
  addTyping();

  const extraPrompts = {
    introduccion: `El alumno quiere ayuda para redactar la introducción de su ensayo sobre "${state.topic}" con tesis: "${state.thesis}". Guíalo paso a paso para construir una introducción académica sólida.`,
    conclusion: `El alumno quiere ayuda para redactar la conclusión de su ensayo sobre "${state.topic}". Guíalo para sintetizar los argumentos y cerrar coherentemente.`,
    ortografia: `El alumno quiere revisión ortográfica de su texto. Pídele que pegue el texto y luego señala los errores de tildación, mayúsculas, grafías y puntuación.`,
    coherencia: `El alumno quiere análisis de coherencia interna. Pídele que pegue el texto y evalúa si las ideas se relacionan lógicamente entre sí.`,
    cohesion: `El alumno quiere verificación de cohesión. Pídele que pegue el texto y evalúa el uso de conectores y la articulación entre párrafos.`,
    registro: `El alumno quiere evaluación del registro académico. Pídele que pegue el texto y evalúa si el léxico y estilo son apropiados para un ensayo universitario.`
  };

  logData("extra_activated", { tipo, name: names[tipo] });

  try {
    const systemExtra = getSystemPrompt() + `\n\nEXTRA ACTIVADO: ${names[tipo]}. ${extraPrompts[tipo]}`;
    const reply = await callClaude(systemExtra, [{ role: "user", content: `Activo el extra: ${names[tipo]}` }]);
    removeTyping();
    addBubble("bot", reply, false);
    setInput(true);
  } catch(e) {
    removeTyping();
    addBubble("bot", "Error al activar el extra. Intenta de nuevo.", false);
    setInput(true);
  }
}

// ============================================================
// ENVIAR MENSAJE
// ============================================================
async function sendMessage() {
  const text = input.value.trim();
  if (!text || !state.inputEnabled) return;
  input.value = "";
  addBubble("user", text, false);
  await botRespond(text);
}

input.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

// ============================================================
// SELECTOR DE TEMA
// ============================================================
function renderTopicSelector() {
  const body = addBubble("bot", "");
  let html = `<div style="margin-bottom:10px">Selecciona el tema de tu ensayo o propón uno propio:</div><div class="topic-grid">`;
  TOPICS.forEach(t => {
    html += `<button class="topic-btn" onclick="selectTopic('${t}')">${t}</button>`;
  });
  html += `</div>
  <div style="margin-top:12px">
    <div style="font-size:12px;color:var(--muted);margin-bottom:6px">¿Tienes otro tema en mente? Debe ser una problemática social peruana:</div>
    <div style="display:flex;gap:8px">
      <input id="custom-topic-input" type="text" placeholder="Escribe tu propio tema..." style="flex:1;border:1.5px solid var(--border);border-radius:10px;padding:8px 12px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);background:var(--bg);outline:none;">
      <button onclick="proposeCustomTopic()" style="background:var(--accent);color:white;border:none;border-radius:10px;padding:8px 16px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;">Proponer</button>
    </div>
  </div>`;
  body.innerHTML = html;
  scrollDown();
}

async function proposeCustomTopic() {
  const input = document.getElementById("custom-topic-input");
  const topic = input.value.trim();
  if (!topic) return;

  // Disable all buttons and input
  document.querySelectorAll(".topic-btn").forEach(b => { b.disabled = true; b.style.opacity = "0.5"; });
  input.disabled = true;

  addBubble("user", topic, false);
  setInput(false);
  addTyping();

  // Validate with Claude
  try {
    const reply = await callClaude(
      `Eres un tutor de escritura académica de la UNMSM. Tu tarea es validar si un tema propuesto por un alumno es una problemática social peruana válida para un ensayo universitario.
      
CRITERIOS DE VALIDACIÓN:
1. Debe ser una problemática social — no un tema científico, tecnológico o de entretenimiento
2. Debe referirse al Perú — aunque puede incluir comparaciones con otros países
3. Debe ser un tema sobre el que existan fuentes académicas disponibles
4. No debe ser demasiado amplio ni demasiado específico

Si el tema ES válido responde exactamente: TEMA_VALIDO
Si el tema NO es válido explica brevemente por qué y sugiere cómo ajustarlo para que sea válido.
Responde siempre en español, máximo 3 oraciones, sin markdown.`,
      [{ role: "user", content: `El alumno propone este tema: "${topic}"` }]
    );
    removeTyping();

    if (reply.includes("TEMA_VALIDO")) {
      await selectTopic(topic);
    } else {
      addBubble("bot", reply, false);
      input.disabled = false;
      document.querySelectorAll(".topic-btn").forEach(b => { b.disabled = false; b.style.opacity = "1"; });
      setInput(false);
    }
  } catch(e) {
    removeTyping();
    addBubble("bot", "No pude validar el tema. Intenta de nuevo.", false);
    input.disabled = false;
    document.querySelectorAll(".topic-btn").forEach(b => { b.disabled = false; b.style.opacity = "1"; });
  }
}

async function selectTopic(topic) {
  state.topic = topic;
  state.groupTopic = topic;
  document.querySelectorAll(".topic-btn").forEach(b => {
    b.disabled = true;
    b.style.opacity = b.textContent === topic ? "1" : "0.5";
    if (b.textContent === topic) b.style.borderColor = "var(--accent2)";
  });
  addBubble("user", topic, false);
  logData("topic_selected", { topic, group: state.groupNumber, student: state.studentName });
  state.currentLevel = 1;
  updateProgress(1);
  setTimeout(() => startLevel(1), 600);
}

// ============================================================
// ARRANQUE — Flujo: Bienvenida → Nombre → Número de grupo → Tema
// ============================================================
setInput(false);

// Verificar fecha límite al inicio
const fechaLimiteInicio = new Date("2026-07-11");
const hoyInicio = new Date();
if (hoyInicio > fechaLimiteInicio) {
  addBubble("bot", "El periodo de uso del tutor virtual del curso de Lenguaje ha concluido el 11 de julio de 2026. Gracias por tu participación.", false);
} else {
  // Verificar si hay progreso guardado
  const savedProgress = loadProgress();
  if (savedProgress && savedProgress.studentName && savedProgress.currentLevel > 0) {
    // Restaurar estado
    Object.assign(state, savedProgress);
    addBubble("bot", `Bienvenido de nuevo, ${state.studentName}. Veo que tienes progreso guardado hasta el ${LEVELS[state.currentLevel].name}.`, false);
    setTimeout(() => {
      const body = addBubble("bot", "");
      body.innerHTML = `<div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap">
        <button onclick="resumeProgress()" style="background:var(--accent);color:white;border:none;border-radius:10px;padding:10px 16px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer">Continuar donde lo dejé</button>
        <button onclick="startFresh()" style="background:var(--surface);color:var(--text);border:1.5px solid var(--border);border-radius:10px;padding:10px 16px;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer">Empezar de nuevo</button>
      </div>`;
      setInput(false);
    }, 600);
  } else {
    startNewSession();
  }
}

function resumeProgress() {
  updateProgress(state.currentLevel);
  addBubble("bot", `Continuamos en el ${LEVELS[state.currentLevel].name}. ¡Adelante!`, false);
  setTimeout(() => startLevel(state.currentLevel), 600);
}

function startFresh() {
  clearProgress();
  Object.assign(state, {
    currentLevel: 0, topic: null, phase: "welcome", exercisesDone: 0,
    history: [], inputEnabled: false, studentName: null, groupNumber: null,
    groupSize: null, groupTopic: null, delimitacion: null, thesis: null,
    sources: [], argument: null, completedLevels: [], dataLog: []
  });
  addBubble("bot", "Empezamos de nuevo. ¿Cuál es tu nombre?", false);
  setInput(true);
  setupWelcomeFlow();
}

function startNewSession() {
  addBubble("bot", "Bienvenido al Tutor Lenguaje de la UNMSM. Te acompañaré paso a paso en la escritura de tu ensayo académico.", false);

setTimeout(() => {
  addBubble("bot", "Trabajaremos por 6 niveles hasta completar tu ensayo. Antes de comenzar necesito algunos datos. ¿Cuál es tu nombre?", false);
  setInput(true);
  setupWelcomeFlow();
}, 1000);
}

function setupWelcomeFlow() {
  const origSend = sendMessage;

  window.sendMessage = async function() {

    // Paso 1: nombre
    if (!state.studentName) {
      const name = input.value.trim();
      if (!name) return;
      state.studentName = name;
      input.value = "";
      addBubble("user", name, false);
      logData("student_registered", { name });
      addBubble("bot", `Hola ${name}. ¿Cuál es el número de tu grupo?`, false);
      return;
    }

    // Paso 2: número de grupo
    if (!state.groupNumber) {
      const num = input.value.trim();
      if (!num) return;
      if (isNaN(num) || parseInt(num) < 1) {
        addBubble("bot", "Por favor ingresa un número de grupo válido (ejemplo: 1, 2, 3...).", false);
        return;
      }
      state.groupNumber = parseInt(num);
      input.value = "";
      addBubble("user", `Grupo ${state.groupNumber}`, false);
      logData("group_registered", { group: state.groupNumber });
      addBubble("bot", `Perfecto, eres del Grupo ${state.groupNumber}. ¿Cuántos integrantes tiene tu grupo?`, false);
      return;
    }

    // Paso 3: tamaño del grupo
    if (!state.groupSize) {
      const size = input.value.trim();
      if (!size) return;
      const n = parseInt(size);
      if (isNaN(n) || n < 1 || n > 4) {
        addBubble("bot", "Por favor ingresa un número válido entre 1 y 4.", false);
        return;
      }
      state.groupSize = n;
      input.value = "";
      const msg = n === 1
        ? "Trabajarás de forma individual. Ahora elige el tema de tu ensayo:"
        : `Tu grupo tiene ${n} integrantes. Ahora elige el tema que acordaron para el ensayo:`;
      addBubble("user", `${n} integrante${n > 1 ? "s" : ""}`, false);
      logData("group_size_registered", { group: state.groupNumber, size: n });
      addBubble("bot", msg, false);
      setInput(false);
      setTimeout(() => renderTopicSelector(), 600);
      return;
    }

    await origSend();
  };
} // fin setupWelcomeFlow y else fecha límite
</script>
